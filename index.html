<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoursePlay ▶</title>
    <meta name="description" content="Learn web development interactively with CoursePlay" />
    <meta name="theme-color" content="#9333ea" />

    <!--
      FIX 5 (belt-and-suspenders):
      Inline style on <html> fires before ANY external CSS or JS loads.
      This is the earliest possible moment to set the background — it
      completely eliminates the white flash that appears for ~100-200ms
      before the browser parses the stylesheet.
    -->
    <style>
      html, body, #root {
        background: #0a0a0a;
        margin: 0;
        padding: 0;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
